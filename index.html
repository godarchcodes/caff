<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hana — 花</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --sakura-pink: #f2a7b8;
      --sakura-deep: #e87a96;
      --sakura-pale: #fde8ef;
      --sakura-blush: #fbd0de;
      --dark-plum: #2d1b2e;
      --midnight: #1a0f1e;
      --text-light: #fff8fa;
      --text-muted: rgba(255,240,248,0.7);
      --petal-1: #f9c8d8;
      --petal-2: #f4adc3;
      --petal-3: #fde0ea;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      background: var(--midnight);
      color: var(--text-light);
    }

    /* ───────── LOADING SCREEN ───────── */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #1a0f1e 0%, #2d1420 50%, #1a0f1e 100%);
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }

    .loader-petals-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      z-index: 2;
    }

    .loader-kanji {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(54px, 12vw, 110px);
      font-weight: 200;
      color: var(--sakura-pink);
      text-shadow: 0 0 60px rgba(242,167,184,0.5), 0 0 120px rgba(242,167,184,0.2);
      animation: pulseKanji 2.5s ease-in-out infinite;
      letter-spacing: 0.05em;
    }
    @keyframes pulseKanji {
      0%, 100% { text-shadow: 0 0 60px rgba(242,167,184,0.5), 0 0 120px rgba(242,167,184,0.2); }
      50% { text-shadow: 0 0 80px rgba(242,167,184,0.8), 0 0 160px rgba(242,167,184,0.4); }
    }

    .loader-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 300;
      letter-spacing: 0.5em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .loader-bar-wrap {
      width: 200px;
      height: 1px;
      background: rgba(242,167,184,0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--sakura-pink), var(--sakura-deep));
      border-radius: 2px;
      animation: loadProgress 2.8s ease forwards;
    }
    @keyframes loadProgress {
      0% { width: 0%; }
      60% { width: 70%; }
      100% { width: 100%; }
    }

    .loader-sub {
      font-size: 11px;
      letter-spacing: 0.35em;
      color: rgba(242,167,184,0.45);
      text-transform: uppercase;
      font-weight: 300;
      animation: fadeSubtext 2.8s ease forwards;
    }
    @keyframes fadeSubtext {
      0% { opacity: 0; }
      40% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    /* ───────── MAIN PAGE ───────── */
    #main {
      position: fixed;
      inset: 0;
      overflow: hidden;
      opacity: 0;
      transition: opacity 1s ease 0.3s;
    }
    #main.visible { opacity: 5; }

    .bg-gif {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center bottom;
      z-index: 0;
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(26,15,30,0.25) 0%,
        rgba(26,15,30,0.1) 40%,
        rgba(26,15,30,0.5) 80%,
        rgba(26,15,30,0.85) 100%
      );
      z-index: 1;
    }

    /* ───────── CONTENT ───────── */
    .content {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: clamp(40px, 8vh, 80px);
      text-align: center;
      padding-bottom: 150px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: cardReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
      animation-delay: 0.2s;
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-deep), #c46b8a);
      padding: 2px;
      margin-bottom: 20px;
      box-shadow: 0 0 30px rgba(232,122,150,0.4), 0 0 60px rgba(232,122,150,0.15);
      animation: avatarGlow 3s ease-in-out infinite;
    }
    @keyframes avatarGlow {
      0%, 100% { box-shadow: 0 0 30px rgba(232,122,150,0.4), 0 0 60px rgba(232,122,150,0.15); }
      50% { box-shadow: 0 0 40px rgba(232,122,150,0.65), 0 0 90px rgba(232,122,150,0.25); }
    }
    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #2d1420 0%, #3d2035 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif JP', serif;
      font-size: 28px;
      color: var(--sakura-pink);
    }

    .username {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--text-light);
      line-height: 1;
      margin-bottom: 6px;
    }

    .username-jp {
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      font-weight: 200;
      letter-spacing: 0.55em;
      color: var(--sakura-pink);
      margin-bottom: 18px;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--sakura-pink), transparent);
      margin-bottom: 18px;
      
    }

    .bio {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(14px, 2.2vw, 17px);
      font-weight: 300;
      font-style: italic;
      color: var(--text-muted);
      max-width: 420px;
      line-height: 1.75;
      margin-bottom: 10px;
      padding: 0 20px;
    }

    .tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 28px;
    }
    .tag {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--sakura-pink);
      border: 1px solid rgba(242,167,184,0.3);
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(242,167,184,0.06);
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
    }

    .buttons {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 12px 26px;
      border-radius: 50px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      letter-spacing: 0.2em;
      font-weight: 400;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: inherit;
    }

    .btn-discord {
      background: linear-gradient(135deg, #5865F2, #7289da);
      color: #fff;
      box-shadow: 0 4px 20px rgba(88,101,242,0.35);
    }
    .btn-discord::before {
      background: linear-gradient(135deg, #7289da, #5865F2);
    }
    .btn-discord:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(88,101,242,0.5); }
    .btn-discord:hover::before { opacity: 1; }

    .btn-web {
      background: rgba(242,167,184,0.12);
      color: var(--sakura-pink);
      border: 1px solid rgba(242,167,184,0.35);
      box-shadow: 0 4px 20px rgba(242,167,184,0.1);
    }
    .btn-web::before {
      background: rgba(242,167,184,0.15);
    }
    .btn-web:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(242,167,184,0.25); }
    .btn-web:hover::before { opacity: 1; }

    .btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .btn span { position: relative; z-index: 1; }

    /* corner deco */
    .corner-deco {
      position: fixed;
      font-family: 'Noto Serif JP', serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: rgba(242,167,184,0.35);
      z-index: 20;
    }
    .corner-deco.tl { top: 22px; left: 28px; }
    .corner-deco.tr { top: 22px; right: 28px; text-align: right; }
    .corner-deco.bl { bottom: 22px; left: 28px; }

    .petal-deco {
      position: fixed;
      font-size: 25px;
      z-index: 20;
      opacity: 0.4;
      animation: rotatePetal 8s linear infinite;
    }
    .petal-deco.one { top: 18px; right: 120px; animation-delay: -2s; }
    .petal-deco.two { bottom: 35px; right: 30px; animation-delay: -5s; }
    @keyframes rotatePetal {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<!-- ═══════════ LOADER ═══════════ -->
<div id="loader">
  <canvas class="loader-petals-canvas" id="loaderCanvas"></canvas>
  <div class="loader-content">
    <div class="loader-kanji">ヤ</div>
    <div class="loader-title">いらっしゃいませ</div>
    <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
    <div class="loader-sub">Entering the garden…</div>
  </div>
</div>

<!-- ═══════════ MAIN ═══════════ -->
<div id="main">
  <img class="bg-gif" src="sakura.gif" alt="Japan pixel art background"/>
  <div class="bg-overlay"></div>
  <!-- Corner decorations -->
  <div class="corner-deco tl">GOD ARCH</div>
  <div class="corner-deco tr">2026</div>
  <div class="corner-deco bl">© CAFF</div>
  <div class="petal-deco two">ヤ</div>

  <div class="content">
    <div class="card">
      
      <div class="username">GOD ARCH</div>
      <div class="username-jp">さくら ・ 桜</div>
      <div class="divider"></div>

      <div class="bio">
        Wandering beneath the cherry blossoms,<br/>
        chasing peace & love across the bad time.
      </div>

      <div class="tags">
        <span class="tag">CODING </span>
        <span class="tag">EDITOR </span>
        <span class="tag">GAMER</span>
        <span class="tag">ARCH USER</span>
      </div>

      <div class="buttons">
        <!-- Discord button -->
        <a href="https://discordapp.com/users/1402688925990129770" class="btn btn-discord" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.055a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
          </svg>
          <span>Discord</span>
        </a>

        <!-- Website button -->
        <a href="https://godarchcodes.github.io/ragnarok.gg/" class="btn btn-web" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span>Visit</span>
        </a>
      </div>
    </div>
  </div>
</div>

<script>
  /* ─────────── LOADER PETALS (canvas particles) ─────────── */
  const lc = document.getElementById('loaderCanvas');
  const lctx = lc.getContext('2d');
  let loaderPetals = [];

  function resizeLoaderCanvas() {
    lc.width = window.innerWidth;
    lc.height = window.innerHeight;
  }
  resizeLoaderCanvas();

  function spawnLoaderPetal() {
    return {
      x: Math.random() * lc.width,
      y: -20,
      size: Math.random() * 7 + 4,
      speedY: Math.random() * 1.2 + 0.5,
      speedX: (Math.random() - 0.5) * 0.8,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.04,
      opacity: Math.random() * 0.6 + 0.3,
      color: ['#f2a7b8','#fbd0de','#f4adc3','#fde0ea'][Math.floor(Math.random()*4)]
    };
  }

  for (let i = 0; i < 40; i++) {
    let p = spawnLoaderPetal();
    p.y = Math.random() * lc.height;
    loaderPetals.push(p);
  }

  function drawPetal(ctx, p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, p.size, p.size * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  let loaderFrame;
  function animateLoader() {
    lctx.clearRect(0, 0, lc.width, lc.height);
    loaderPetals.forEach((p, i) => {
      p.y += p.speedY;
      p.x += p.speedX + Math.sin(p.y * 0.012) * 0.4;
      p.rot += p.rotSpeed;
      if (p.y > lc.height + 20) { loaderPetals[i] = spawnLoaderPetal(); }
      drawPetal(lctx, p);
    });
    loaderFrame = requestAnimationFrame(animateLoader);
  }
  animateLoader();

  /* ─────────── TRANSITION ─────────── */
  window.addEventListener('load', () => {
    setTimeout(() => {
      const loader = document.getElementById('loader');
      const main = document.getElementById('main');
      loader.classList.add('hidden');
      main.classList.add('visible');
      cancelAnimationFrame(loaderFrame);
    }, 3200);
  });
</script>
</body>
</html>
